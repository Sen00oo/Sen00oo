<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<title>System Access</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    background:#000;
    color:#0f0;
    font-family:'Courier New', monospace;
    overflow:hidden;
    height:100%;
    width:100%;
  }
  #matrix {
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:1;
  }
  #overlay {
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:30px 20px;
    pointer-events:none;
  }
  #console {
    width:100%;
    max-width:900px;
    background:rgba(0,10,0,0.75);
    border:1px solid #0f0;
    border-radius:6px;
    box-shadow:0 0 25px #0f0a, inset 0 0 15px #0f03;
    padding:18px 22px;
    height:60vh;
    overflow:hidden;
    font-size:14px;
    line-height:1.5;
    backdrop-filter: blur(1px);
  }
  #console .line { white-space:pre-wrap; word-break:break-all; opacity:0.9; }
  #console .line.err { color:#ff3b3b; }
  #console .line.warn { color:#ffcc00; }
  #console .line.info { color:#4fd1ff; }
  .cursor {
    display:inline-block; width:8px; background:#0f0; animation:blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  #hud {
    width:100%; max-width:900px; margin-top:16px;
  }
  #barWrap {
    width:100%; height:26px; border:1px solid #0f0; border-radius:4px; overflow:hidden;
    background:#001400; box-shadow:0 0 12px #0f05;
    position:relative;
  }
  #barFill {
    height:100%; width:0%;
    background:repeating-linear-gradient(45deg,#0f0,#0f0 10px,#0c0 10px,#0c0 20px);
    box-shadow:0 0 20px #0f0;
    transition:width 0.12s linear;
  }
  #barText {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-weight:bold; color:#000; text-shadow:0 0 4px #0f0, 0 0 2px #fff;
    letter-spacing:2px;
  }
  #status {
    margin-top:10px; font-size:15px; color:#0f0; text-align:center;
    text-shadow:0 0 8px #0f0;
    min-height:22px;
  }

  #glitchTitle {
    font-size:34px; font-weight:bold; letter-spacing:6px; margin-bottom:18px;
    color:#0f0; text-shadow:0 0 10px #0f0, 0 0 25px #0f0;
    position:relative;
  }

  #finalScreen {
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:10;
    background:#000;
    display:none;
    align-items:center; justify-content:center; flex-direction:column;
    text-align:center;
    animation:flashIn 0.4s ease-in;
  }
  @keyframes flashIn { from{ background:#0f0; } to{ background:#000; } }
  #finalScreen h1 {
    color:#ff2b2b; font-size:44px; letter-spacing:3px;
    text-shadow:0 0 20px #ff2b2b, 0 0 45px #ff0000;
    margin-bottom:20px;
  }
  #finalScreen h2 {
    color:#0f0; font-size:22px; margin-bottom:10px;
    text-shadow:0 0 12px #0f0;
  }
  #finalScreen p.sig {
    color:#ff2b2b; font-size:26px; letter-spacing:4px; margin-top:30px;
    text-shadow:0 0 15px #ff2b2b;
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  #finalScreen p.warn2 {
    color:#ccc; margin-top:14px; font-size:16px; letter-spacing:1px;
  }
  #skullbox { font-size:70px; margin-bottom:10px; filter:drop-shadow(0 0 15px #ff2b2b); }

  /* ================= Cinematic photo intro (HUD dossier style) ================= */
  #introScreen {
    position:fixed; inset:0; z-index:50;
    background:#000;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  #introScreen .grid {
    position:absolute; inset:0; z-index:1;
    background-image:
      linear-gradient(rgba(0,255,65,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,65,0.06) 1px, transparent 1px);
    background-size:34px 34px;
    animation:gridDrift 12s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position:0 0, 0 0; }
    to { background-position:0 340px, 340px 0; }
  }
  #dossier {
    position:relative; z-index:3;
    display:flex; align-items:stretch; gap:0;
    opacity:0;
    animation:dossierIn 0.5s ease-out 0.2s forwards;
  }
  @keyframes dossierIn { to { opacity:1; } }
  #photoFrame {
    position:relative;
    width:260px; height:325px;
    border:1px solid #0f0;
    box-shadow:0 0 20px #0f05, inset 0 0 10px #0f02;
    overflow:hidden;
    flex-shrink:0;
  }
  #photoFrame img {
    width:100%; height:100%; object-fit:cover;
    filter:grayscale(0.2) contrast(1.15) saturate(0.9) brightness(0.95);
    opacity:0;
    animation:photoReveal 0.15s steps(1) 0.5s forwards, photoGlitchIn 0.7s ease-out 0.65s forwards;
  }
  @keyframes photoReveal { to { opacity:1; } }
  @keyframes photoGlitchIn {
    0%   { clip-path:inset(0 0 100% 0); }
    20%  { clip-path:inset(0 0 60% 0); transform:translateX(-6px); }
    40%  { clip-path:inset(0 0 35% 0); transform:translateX(4px); }
    60%  { clip-path:inset(0 0 12% 0); transform:translateX(-2px); }
    100% { clip-path:inset(0 0 0 0); transform:translateX(0); }
  }
  #photoFrame .sweep {
    position:absolute; left:0; right:0; top:-100%; height:60%;
    background:linear-gradient(180deg, transparent, rgba(0,255,65,0.35), transparent);
    animation:sweepDown 1.6s ease-in-out 0.6s 2;
  }
  @keyframes sweepDown {
    0% { top:-60%; }
    100% { top:110%; }
  }
  #photoFrame .corner {
    position:absolute; width:16px; height:16px; z-index:4;
    border-color:#0f0; opacity:0.9;
  }
  #photoFrame .corner.tl { top:6px; left:6px; border-top:2px solid; border-left:2px solid; }
  #photoFrame .corner.tr { top:6px; right:6px; border-top:2px solid; border-right:2px solid; }
  #photoFrame .corner.bl { bottom:6px; left:6px; border-bottom:2px solid; border-left:2px solid; }
  #photoFrame .corner.br { bottom:6px; right:6px; border-bottom:2px solid; border-right:2px solid; }

  #dataPanel {
    width:280px;
    border:1px solid #0f0;
    border-left:none;
    background:rgba(0,10,0,0.55);
    padding:16px 18px;
    display:flex; flex-direction:column;
    justify-content:center;
    box-shadow:0 0 20px #0f05, inset 0 0 10px #0f02;
  }
  #dataPanel .row {
    font-size:11px; letter-spacing:1px; color:#7fffb0;
    margin-bottom:10px; white-space:nowrap; overflow:hidden;
    border-right:2px solid transparent;
  }
  #dataPanel .row .label { color:#3a7d4a; }
  #dataPanel .row .val { color:#0f0; text-shadow:0 0 4px #0f0; }
  #dataPanel .row.critical .val { color:#ff3b3b; text-shadow:0 0 6px #ff3b3b; }

  #introScreen.fadeOut {
    animation:introFadeOut 0.3s ease-in forwards;
  }
  @keyframes introFadeOut {
    0% { opacity:1; filter:none; }
    45% { opacity:1; filter:invert(1) contrast(2); }
    100% { opacity:0; filter:none; }
  }
</style>
</head>

    </div>
    <div id="dataPanel">
      <div class="row"><span class="label">STATUS:&nbsp;</span><span class="val" id="dRow1"></span></div>
      <div class="row"><span class="label">MATCH:&nbsp;</span><span class="val" id="dRow2"></span></div>
      <div class="row"><span class="label">ID:&nbsp;</span><span class="val" id="dRow3"></span></div>
      <div class="row"><span class="label">LOCATION:&nbsp;</span><span class="val" id="dRow4"></span></div>
      <div class="row critical"><span class="label">THREAT:&nbsp;</span><span class="val" id="dRow5"></span></div>
    </div>

<script>
// ================= Matrix rain background =================
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const chars = "アイウエオカキクケコサシスセソ0123456789ABCDEFXYZ$#@%&*<>/\\";
const fontSize = 16;
let columns, drops;
function initDrops(){
  columns = Math.floor(canvas.width / fontSize);
  drops = new Array(columns).fill(1);
}
initDrops();
window.addEventListener('resize', initDrops);

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#0f0";
  ctx.font = fontSize + "px monospace";
  for(let i=0;i<drops.length;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix, 40);

// ================= Fake terminal log =================
const consoleEl = document.getElementById('console');
const fakeLines = [
  ["info","[*] Initializing remote shell session..."],
  ["", "root@target:~# nmap -sS -Pn 192.168.1.0/24"],
  ["", "Starting scan... found 14 active hosts"],
  ["warn","[!] Firewall signature bypass: SUCCESS"],
  ["", "root@target:~# ssh_exploit --target=10.0.0.4 --payload=reverse_shell"],
  ["info","[*] Establishing encrypted tunnel (AES-256)..."],
  ["", "connection established: 10.0.0.4:4444"],
  ["", "root@target:~# ls -la /home/user/"],
  ["", "drwxr-xr-x  photos/  messages/  contacts.db  backup.enc"],
  ["warn","[!] Decrypting backup.enc ..."],
  ["", "key found: 9F3A-11B2-77CE-DEAD"],
  ["", "decryption complete."],
  ["info","[*] Dumping contacts.db -> local storage"],
  ["", "1247 records extracted"],
  ["err","[!] Intrusion detection triggered — spoofing MAC address"],
  ["", "MAC spoof: OK | new addr: 00:1A:2B:DE:AD:FF"],
  ["info","[*] Accessing camera module..."],
  ["", "camera_stream.mp4 saved (0 bytes - dummy)"],
  ["info","[*] Accessing microphone module..."],
  ["", "mic_capture.wav saved (0 bytes - dummy)"],
  ["", "root@target:~# extract --all --output=/tmp/dump.zip"],
  ["", "compressing 4.2GB of data..."],
  ["warn","[!] Bypassing 2FA token validation..."],
  ["", "token bypass: SUCCESS"],
  ["info","[*] Uploading dump.zip to remote server..."],
  ["", "upload progress: [##########] 100%"],
  ["err","[!] WARNING: unauthorized access logged by target system"],
  ["", "clearing logs... /var/log/auth.log wiped"],
  ["", "clearing logs... /var/log/syslog wiped"],
  ["info","[*] Finalizing operation, covering tracks..."],
];

let lineIndex = 0;
let charIndex = 0;
let currentLineDiv = null;

function typeNextChar(){
  if(lineIndex >= fakeLines.length){
    lineIndex = 0; // loop the log endlessly under the progress bar
  }
  if(!currentLineDiv){
    currentLineDiv = document.createElement('div');
    const cls = fakeLines[lineIndex][0];
    currentLineDiv.className = 'line' + (cls ? ' '+cls : '');
    consoleEl.appendChild(currentLineDiv);
  }
  const fullText = fakeLines[lineIndex][1];
  if(charIndex < fullText.length){
    currentLineDiv.textContent = fullText.substring(0, charIndex+1);
    charIndex++;
    setTimeout(typeNextChar, 8 + Math.random()*18);
  } else {
    lineIndex++;
    charIndex = 0;
    currentLineDiv = null;
    while(consoleEl.children.length > 22){
      consoleEl.removeChild(consoleEl.firstChild);
    }
    consoleEl.scrollTop = consoleEl.scrollHeight;
    setTimeout(typeNextChar, 60 + Math.random()*120);
  }
}

// ================= Progress bar + status messages =================
const barFill = document.getElementById('barFill');
const barText = document.getElementById('barText');
const statusEl = document.getElementById('status');

const statusMessages = [
  {p:0,   msg:"جاري تهيئة الاتصال..."},
  {p:8,   msg:"تجاوز جدار الحماية..."},
  {p:18,  msg:"الوصول إلى النظام... تم"},
  {p:27,  msg:"نسخ جهات الاتصال..."},
  {p:38,  msg:"نسخ الصور والفيديوهات..."},
  {p:49,  msg:"استخراج الرسائل..."},
  {p:60,  msg:"الوصول إلى الكاميرا..."},
  {p:70,  msg:"تجاوز التحقق بخطوتين..."},
  {p:80,  msg:"رفع البيانات إلى السيرفر..."},
  {p:90,  msg:"مسح آثار الاختراق..."},
  {p:97,  msg:"إنهاء العملية..."},
  {p:100, msg:"تم بنجاح."},
];

let progress = 0;

function updateStatus(){
  for(let i=statusMessages.length-1;i>=0;i--){
    if(progress >= statusMessages[i].p){
      statusEl.textContent = statusMessages[i].msg;
      break;
    }
  }
}

function tickProgress(){
  if(progress < 100){
    const step = progress < 85 ? (Math.random()*1.3+0.3) : (Math.random()*0.4+0.05);
    progress = Math.min(100, progress + step);
    barFill.style.width = progress + "%";
    barText.textContent = Math.floor(progress) + "%";
    updateStatus();
    setTimeout(tickProgress, 90 + Math.random()*140);
  } else {
    barFill.style.width = "100%";
    barText.textContent = "100%";
    statusEl.textContent = "تم بنجاح.";
    setTimeout(showFinalScreen, 900);
  }
}

function showFinalScreen(){
  document.getElementById('finalScreen').style.display = 'flex';
}

// ================= Sequence: fully automatic, no click / no sound =================
function startMainSequence(){
  typeNextChar();
  setTimeout(tickProgress, 500);
}

// ================= Dossier data panel typewriter =================
const dossierRows = [
  { id:'dRow1', text:'ANALYZING...', delay:900 },
  { id:'dRow2', text:'98.7%', delay:1500 },
  { id:'dRow3', text:'SEN00OO', delay:2100 },
  { id:'dRow4', text:'UNKNOWN / MASKED', delay:2700 },
  { id:'dRow5', text:'CRITICAL', delay:3300 },
];

function typeRow(el, text, speed){
  let i = 0;
  el.textContent = '';
  const iv = setInterval(() => {
    el.textContent += text[i];
    i++;
    if(i >= text.length) clearInterval(iv);
  }, speed);
}

function runDossierTyping(){
  dossierRows.forEach(r => {
    setTimeout(() => {
      const el = document.getElementById(r.id);
      if(el) typeRow(el, r.text, 28);
    }, r.delay);
  });
}

function runIntroThenStart(){
  const intro = document.getElementById('introScreen');
  runDossierTyping();
  // Total intro time on screen before the glitch-out transition
  const INTRO_DURATION = 4200;
  setTimeout(() => {
    intro.classList.add('fadeOut');
    setTimeout(() => {
      intro.style.display = 'none';
      startMainSequence();
    }, 350);
  }, INTRO_DURATION);
}

// Runs immediately on page load — no click, no audio, nothing to press.
runIntroThenStart();
</script>
